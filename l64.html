<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word game current version</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f7f7f7;
  color: #222;
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  display: flex;
  gap: 24px;
  align-items: center;
  flex-wrap: wrap;
  padding: 12px 16px;
  background: white;
  border-bottom: 1px solid #ddd;
}

.controls {
  margin-left: auto;
}

button {
  padding: 8px 12px;
  border: 1px solid #bbb;
  border-radius: 10px;
  background: white;
  cursor: pointer;
  font-size: 14px;
}

button:hover {
  background: #f2f2f2;
}

.viewport {
  height: calc(100vh - 70px);
  overflow: auto;
  padding: 16px;
}

.board {
  min-width: 2800px;
  min-height: 1200px;
  padding: 12px;
}

.section-title {
  margin: 6px 0 10px;
  font-size: 13px;
  font-weight: bold;
  color: #666;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.completed-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-content: flex-start;
  margin-bottom: 20px;
  min-height: 20px;
}

.rows {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.row {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  min-height: 52px;
  width: max-content;
}

.tile {
  display: -webkit-box;
  -webkit-box-orient: vertical;
  -webkit-line-clamp: 2;
  overflow: hidden;

  min-height: 44px;
  max-width: 220px;
  padding: 8px 10px;
  border: 1px solid #999;
  border-radius: 12px;
  background: white;
  cursor: pointer;
  font-size: 14px;
  line-height: 1.25;
  white-space: normal;
  overflow-wrap: anywhere;
  word-break: break-word;
  transition:
    transform 0.12s ease,
    box-shadow 0.12s ease,
    background-color 0.25s ease,
    border-color 0.25s ease;
  user-select: none;
}

.tile:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.tile.selected {
  outline: 3px solid #4a90e2;
}

.tile.completed {
  font-weight: bold;
  border-width: 3px;
}

.tile.merged {
  border-width: 3px;
}

.tile.shake {
  animation: shake 0.28s linear 1;
}

@keyframes shake {
  0%   { transform: translateX(0); }
  20%  { transform: translateX(-3px); }
  40%  { transform: translateX(3px); }
  60%  { transform: translateX(-2px); }
  80%  { transform: translateX(2px); }
  100% { transform: translateX(0); }
}
</style>
</head>

<body>

<div class="topbar">
  <div>Соединения: <b id="score">0</b></div>
  <div>Ошибки: <b id="mistakes">0</b></div>
  <div>Собрано категорий: <b id="completedCount">0</b></div>

  <div class="controls">
    <button id="newGameBtn">Новая игра</button>
  </div>
</div>

<div class="viewport">
  <div class="board">
    <div class="section-title">Категории</div>
    <div id="completedGrid" class="completed-grid"></div>

    <div class="section-title">Понятия</div>
    <div id="rows" class="rows"></div>
  </div>
</div>

<script>
/* =========================================
   ДАННЫЕ ИГРЫ
   Меняйте только этот блок, когда добавите новые слова
   ========================================= */

const GAME_DATA = {
  wordsPerCategory:8,
  itemsPerRow: 12,
  storageKey: "word-game-current-state-l64",
  wordSeparator: " | ",

  categories: [
  {
      id: "m1",
      title: "Омонимы",
      color: "#32CD32",
      borderColor: "#FFC0CB",
      words: ["коса","ключ","лук","брак","ручка","гриф","кисть","норка"]
    },
    {
      id: "m2",
      title: "Палиндромы",
      color: "#1E90FF",
      borderColor: "#FFD700",
      words: ["дед","довод","заказ","казак","шалаш","потоп","топот","комок"
      ]
    },
    {
      id: "m3",
      title: "Омографы",
      color: "#FF8C00",
      borderColor: "#4682B4",
      words: ["замок","мука","хлопок","атлас","пропасть","стрелки","кружки","полки"
      ]
    },
    {
      id: "m4",
      title: "Сложные слова",
      color: "#66CDAA",
      borderColor: "#FF6347",
      words: ["самолет","медведь","сумасшедший","землетрясение","паровоз","пароход","велосипед","самокат"
      ]
    },
    {
      id: "m5",
      title: "Прилагательные",
      color: "#DDA0DD",
      borderColor: "#000080",
      words: ["яркий","мокрый","вчерашний","воскресный","опасный","быстрый","дикий","всеядный"
      ]
    },
    {
      id: "m6",
      title: "Глаголы",
      color: "#FAEBD7",
      borderColor: "#FF4500",
      words: ["открыть","спасать","лететь","рисовать","играть","ехать","плыть","топтать"
      ]
    },
    {
      id: "m7",
      title: "Наречия времени",
      color: "#DDA0DD",
      borderColor: "#7FFF00",
      words: ["вчера","сегодня","завтра","ночью","сейчас","всегда","потом","давно"
      ]
    },
    {
      id: "m8",
      title: "Pluralia tantum",
      color: "#00FF00",
      borderColor: "#FF4500",
      words: ["ножницы","каникулы","шахматы","сутки","хлопоты","джинсы","чернила","джунгли"
      ]
    }
  ]
};


/* =========================================
   СОСТОЯНИЕ
   ========================================= */

const STORAGE_KEY = GAME_DATA.storageKey;
const SIZE = GAME_DATA.wordsPerCategory;
const ITEMS_PER_ROW = GAME_DATA.itemsPerRow;
const WORD_SEPARATOR = GAME_DATA.wordSeparator;
const categories = GAME_DATA.categories;

let groups = {};
let activeRows = [];
let completedIds = [];
let selected = null;
let score = 0;
let mistakes = 0;
let shakingIds = [];

/* =========================================
   УТИЛИТЫ
   ========================================= */

function shuffle(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function getCategoryById(id) {
  return categories.find(c => c.id === id);
}

function validateData() {
  const ids = new Set();

  for (const category of categories) {
    if (!category.id) {
      throw new Error("У категории нет id");
    }

    if (ids.has(category.id)) {
      throw new Error(`Повторяющийся id категории: ${category.id}`);
    }

    ids.add(category.id);

    if (!Array.isArray(category.words)) {
      throw new Error(`У категории ${category.id} words должен быть массивом`);
    }

    if (category.words.length !== SIZE) {
      throw new Error(
        `В категории "${category.title}" должно быть ровно ${SIZE} слов. Сейчас: ${category.words.length}`
      );
    }
  }
}

function clampWordsForTile(words, separator = " - ") {
  if (!words || words.length === 0) return "";

  const maxChars = 42;
  let result = "";

  for (let i = 0; i < words.length; i++) {
    const candidate = result ? result + separator + words[i] : words[i];

    if (candidate.length <= maxChars) {
      result = candidate;
    } else {
      if (!result) {
        return words[i].slice(0, maxChars - 1) + "…";
      }
      return result + "…";
    }
  }

  return result;
}

function getGroupText(group) {
  if (group.completed) {
    return clampWordsForTile([group.title], WORD_SEPARATOR);
  }

  const text = clampWordsForTile(group.words, WORD_SEPARATOR);

  if (group.words.length > 1) {
    return `<b>${group.words.length}</b>${WORD_SEPARATOR}${text}`;
  }

  return text;
}

function getTooltipText(group) {
  if (group.completed) {
    return `${group.title}: ${group.words.join(", ")}`;
  }
  return group.words.join(", ");
}

function findPosition(groupId) {
  for (let rowIndex = 0; rowIndex < activeRows.length; rowIndex++) {
    const indexInRow = activeRows[rowIndex].indexOf(groupId);
    if (indexInRow !== -1) {
      return { rowIndex, indexInRow };
    }
  }
  return null;
}

function removeFromRow(groupId) {
  const pos = findPosition(groupId);
  if (!pos) return;

  activeRows[pos.rowIndex].splice(pos.indexInRow, 1);

  if (activeRows[pos.rowIndex].length === 0) {
    activeRows.splice(pos.rowIndex, 1);
  }
}

function saveState() {
  const state = {
    groups,
    activeRows,
    completedIds,
    score,
    mistakes
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function loadState() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return false;

  try {
    const state = JSON.parse(raw);
    groups = state.groups || {};
    activeRows = state.activeRows || [];
    completedIds = state.completedIds || [];
    score = state.score || 0;
    mistakes = state.mistakes || 0;
    selected = null;
    shakingIds = [];
    return true;
  } catch (e) {
    return false;
  }
}

function clearState() {
  localStorage.removeItem(STORAGE_KEY);
}

/* =========================================
   СОЗДАНИЕ ИГРЫ
   ========================================= */

function createInitialGame() {
  let all = [];

  categories.forEach(category => {
    category.words.forEach((word, i) => {
      all.push({
        id: `${category.id}_${i}`,
        word,
        category: category.id,
        title: category.title
      });
    });
  });

  all = shuffle(all);

  groups = {};
  activeRows = [];
  completedIds = [];
  selected = null;
  score = 0;
  mistakes = 0;
  shakingIds = [];

  all.forEach(item => {
    groups[item.id] = {
      id: item.id,
      words: [item.word],
      category: item.category,
      title: item.title,
      completed: false
    };
  });

  for (let i = 0; i < all.length; i += ITEMS_PER_ROW) {
    activeRows.push(all.slice(i, i + ITEMS_PER_ROW).map(item => item.id));
  }

  saveState();
}

/* =========================================
   РЕНДЕР
   ========================================= */

function renderCompleted() {
  const container = document.getElementById("completedGrid");
  container.innerHTML = "";

  completedIds.forEach(groupId => {
    const group = groups[groupId];
    if (!group) return;

    const tile = document.createElement("div");
    tile.className = "tile completed";

    const category = getCategoryById(group.category);
    if (category) {
      tile.style.backgroundColor = category.color;
      tile.style.borderColor = category.borderColor;
    }

    if (selected === group.id) {
      tile.classList.add("selected");
    }

    if (shakingIds.includes(group.id)) {
      tile.classList.add("shake");
    }

    tile.innerHTML = getGroupText(group);
    tile.title = getTooltipText(group);
    tile.onclick = () => clickGroup(group.id);

    container.appendChild(tile);
  });
}

function renderRows() {
  const rowsEl = document.getElementById("rows");
  rowsEl.innerHTML = "";

  activeRows.forEach(rowIds => {
    const rowEl = document.createElement("div");
    rowEl.className = "row";

    rowIds.forEach(groupId => {
      const group = groups[groupId];
      if (!group) return;

      const tile = document.createElement("div");
      tile.className = "tile";

      if (selected === group.id) {
        tile.classList.add("selected");
      }

      if (group.completed) {
        tile.classList.add("completed");
      }

      if (shakingIds.includes(group.id)) {
        tile.classList.add("shake");
      }

      if (group.words.length > 1) {
        tile.classList.add("merged");
      }

      tile.innerHTML = getGroupText(group);
      tile.title = getTooltipText(group);
      tile.onclick = () => clickGroup(group.id);

      rowEl.appendChild(tile);
    });

    rowsEl.appendChild(rowEl);
  });
}

function renderStats() {
  document.getElementById("score").innerText = score;
  document.getElementById("mistakes").innerText = mistakes;
  document.getElementById("completedCount").innerText = completedIds.length;
}

function render() {
  renderStats();
  renderCompleted();
  renderRows();
}

/* =========================================
   ЛОГИКА ИГРЫ
   ========================================= */

function clickGroup(id) {
  if (selected === null) {
    selected = id;
    render();
    return;
  }

  if (selected === id) {
    selected = null;
    render();
    return;
  }

  merge(selected, id);
  selected = null;
}

function merge(a, b) {
  const A = groups[a];
  const B = groups[b];

  if (!A || !B) return;
  if (A.completed || B.completed) return;

  if (A.category !== B.category) {
    mistakes++;
    saveState();
    triggerShake([a, b]);
    return;
  }

  groups[b] = {
    ...B,
    words: [...A.words, ...B.words],
    completed: [...A.words, ...B.words].length === SIZE
  };

  delete groups[a];
  removeFromRow(a);

  if (groups[b].completed) {
    removeFromRow(b);
    completedIds.push(b);
  }

  score++;
  saveState();
  render();
}

function triggerShake(ids) {
  shakingIds = ids;
  render();

  setTimeout(() => {
    shakingIds = [];
    render();
  }, 320);
}

/* =========================================
   УПРАВЛЕНИЕ
   ========================================= */

function newGame() {
  clearState();
  createInitialGame();
  render();
}

function init() {
  validateData();

  const loaded = loadState();
  if (!loaded) {
    createInitialGame();
  }

  render();
}

document.getElementById("newGameBtn").addEventListener("click", newGame);

init();
</script>

</body>
</html>
